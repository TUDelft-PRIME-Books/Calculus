name: Merge development + sandboxes into review-toc (PR)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: merge-into-review-toc
  cancel-in-progress: false

jobs:
  merge-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch (review-toc)
        uses: actions/checkout@v4
        with:
          ref: review-toc
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create sync branch
        id: sync
        run: |
          SYNC_BRANCH="sync/review-toc/${GITHUB_RUN_ID}"
          echo "SYNC_BRANCH=$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$SYNC_BRANCH"

      - name: Fetch source branches
        run: |
          git fetch origin development
          git fetch origin Sandbox-Willem
          git fetch origin sandbox-roelof

      - name: Merge in order (continue workflow even if conflicts happen)
        id: merges
        continue-on-error: true
        run: |
          set -e

          MERGED=""
          CONFLICTED=""

          try_merge () {
            local SRC="$1"
            local MSG="$2"

            echo "Merging $SRC..."
            if git merge --no-ff -m "$MSG" "origin/$SRC"; then
              MERGED="$MERGED $SRC"
              return 0
            else
              CONFLICTED="$SRC"
              echo "Conflict while merging $SRC"
              return 1
            fi
          }

          # Merge in deterministic order; stop at first conflict
          try_merge "development" "Merge development into review-toc" || true
          if [ -z "$CONFLICTED" ]; then try_merge "Sandbox-Willem" "Merge Sandbox-Willem into review-toc" || true; fi
          if [ -z "$CONFLICTED" ]; then try_merge "sandbox-roelof" "Merge sandbox-roelof into review-toc" || true; fi

          echo "MERGED=$MERGED" >> "$GITHUB_OUTPUT"
          echo "CONFLICTED=$CONFLICTED" >> "$GITHUB_OUTPUT"

          # If a merge conflicted, abort that in-progress merge so the branch is pushable.
          # (The PR will still show conflicts vs base if the combined changes can't merge cleanly.)
          if [ -n "$CONFLICTED" ]; then
            git merge --abort || true
          fi

      - name: Push PR branch
        run: |
          git push --set-upstream origin "${{ steps.sync.outputs.SYNC_BRANCH }}"

      - name: Create or update PR into review-toc
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: review-toc
          head: ${{ steps.sync.outputs.SYNC_BRANCH }}
          title: "Merge development + sandboxes into review-toc"
          body: |
            This PR was created by a manually-triggered workflow.

            Merge order:
            - development
            - Sandbox-Willem
            - sandbox-roelof

            Merged successfully: ${{ steps.merges.outputs.MERGED }}
            First merge that conflicted (if any): ${{ steps.merges.outputs.CONFLICTED }}

            If the PR shows conflicts, resolve them in GitHub (“Resolve conflicts”) or locally,
            then push to this PR branch.
          labels: |
            automated
            review-toc

      - name: Job summary
        run: |
          {
            echo "## Result"
            echo ""
            echo "- PR head branch: \`${{ steps.sync.outputs.SYNC_BRANCH }}\`"
            echo "- Merged successfully: \`${{ steps.merges.outputs.MERGED }}\`"
            echo "- First conflict (if any): \`${{ steps.merges.outputs.CONFLICTED }}\`"
            echo ""
            if [ -n "${{ steps.merges.outputs.CONFLICTED }}" ]; then
              echo "A conflict occurred while merging **${{ steps.merges.outputs.CONFLICTED }}**."
              echo "A PR was still created so you can review/resolve conflicts."
            else
              echo "All merges completed successfully."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
