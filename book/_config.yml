title: Calculus
author: Authors from Delft University of Technology, built with <a href="https://teachbooks.io">TeachBooks</a> and <a href="https://jupyterbook.org/">Jupyter Book</a>, <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="license noopener noreferrer"">CC BY 4.0<img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt=""><img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt=""></a>
execute:
  execute_notebooks: "off"

parse:
    myst_enable_extensions:
      ## don't forget to list any other extensions you want enabled,
      ## including those that are enabled by default!
      - colon_fence 
      - dollarmath
      - linkify
      - substitution
      - tasklist
      - amsmath
    myst_dmath_double_inline: true
    myst_heading_anchors : 5

only_build_toc_files: true

html:
  baseurl :  "https://tudelft-prime-books.github.io/Calculus/"

sphinx:
  config:
    mathjax3_config:
      tex:
        macros:
          "Re": ["\\operatorname{Re}\\left(#1\\right)",1]
          "Im": ["\\operatorname{Im}\\left(#1\\right)",1]
          "vect": ["\\mathbf{#1}",1]
          "vec": ["\\mathbf{#1}",1]
          "nicefrac": ["\\frac{#1}{#2}", 2]
          "R": "\\mathbb{R}"
          "norm": ["\\left\\Vert #1 \\right\\Vert",1]
          "ip" : "\\cdot"
          "cp": ["\\times "]
    inverter_all: false
    html_js_files:
    - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js # Required for live code: https://teachbooks.io/manual/features/live_code.html
    thebe_config:
      use_thebe_lite: true                           # Required for live code: https://teachbooks.io/manual/features/live_code.html
      exclude_patterns: ["**/_*.yml", "**/*.md", "**/*.ipynb"] # Exclude files which should not be accessible for live code: https://teachbooks.io/manual/features/live_code.html
    html_theme_options:
      logo:
        text: Calculus
      repository_url: "https://github.com/TUDelft-PRIME-Books/Calculus"
      path_to_docs: "book"
      repository_branch: "published"
      use_edit_page_button: true
      use_repository_button: true
      use_issues_button : true
      launch_buttons:
        thebe: true                                  # Required for live code: https://teachbooks.io/manual/features/live_code.html
    html_show_copyright: false                       # As the copyright is included in the author field
    html_last_updated_fmt: '%B %-d, %Y'              # Adds the date of the last update to the footer
  extra_extensions:                                  # Extra extensions to be used in the book
    - jupyterbook_patches                            # Patches by TeachBooks https://github.com/TeachBooks/JupyterBook-Patches
    - download_link_replacer                         # Allows you to replace and add downloadable files to a page header https://teachbooks.io/manual/external/Download-Link-Replacer/README.html
    - teachbooks_sphinx_tippy                        # Enables hoover over tips https://teachbooks.io/manual/external/teachbooks-sphinx-tippy/README.html
    - sphinx_proof                                   # Adds proof environments to your book
    - sphinx_togglebutton                            # Adds toggle buttons to your book
    - sphinx_exercise                                # Adds exercise environments to your book
    - teachbooks_sphinx_grasple                      # Adds the Grasple exercises to your book 
    - sphinx_prime_applets                           # Adds the Prime applets to your book
    - sphinx_indexed_definitions                     # Adds indexed definitions to your book
    - sphinx_ref_graph                               # Adds a graph of references to your book
    - sphinx_dropdown_toggle                         # Adds dropdown toggles to your book
    - sphinx_tudelft_theme                           # Adds the TU Delft theme to your book https://teachbooks.io/manual/external/Sphinx-TUDelft-theme/README.html
    - sphinx_image_inverter                          # Inverts images for dark mode https://teachbooks.io/manual/external/Sphinx-Image-Inverter/README.html
