title: Calculus
author: D. den Ouden-van der Horst, W.M. Schouten-Straatman & R. Koekoek from Delft University of Technology, built with <a href="https://teachbooks.io">TeachBooks</a> and <a href="https://jupyterbook.org/">Jupyter Book</a>, <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="license noopener noreferrer"">CC BY 4.0<img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt=""><img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt=""></a>
execute:
  execute_notebooks: "off"

parse:
    myst_enable_extensions:
      ## don't forget to list any other extensions you want enabled,
      ## including those that are enabled by default!
      - colon_fence 
      - dollarmath
      - linkify
      - substitution
      - tasklist
      - amsmath
      - attrs_inline
    myst_dmath_double_inline: true
    myst_heading_anchors : 5

only_build_toc_files: true

html:
  baseurl :  "https://tudelft-prime-books.github.io/Calculus/"

sphinx:
  local_extensions:
    text_replacer: _ext/
    check_captions: _ext/
    # image_checker: _ext/
    numref_section: _ext/
  config:
    tippy_skip_urls:
      - https://en.wikipedia.org/wiki/File:Parametric_ellipse.gif
    todo_include_todos: true
    prf_realtyp_to_countertyp:
      "axiom": "theorem"
      "theorem": "theorem"
      "lemma": "theorem"
      "algorithm": "theorem"
      "definition": "theorem"
      "remark": "theorem"
      "conjecture": "theorem"
      "corollary": "theorem"
      "criterion": "theorem"
      "example": "theorem"
      "property": "theorem"
      "observation": "theorem"
      "proposition": "theorem"
      "assumption": "theorem"
      "notation": "theorem"
    language: en
    numfig_format:
      figure: Figure %s
    html_secnumber_suffix: " "
    proof_title_format: " *%t*"
    proof_title_weight: "var(--bs-body-font-weight)"
    metadata_figure_settings:
      license:
        substitute_missing: true
      date:
        substitute_missing: true
    sphinx_indexed_defs_indexed_nodes: ['strong']
    tud_change_titlesize: true
    new_tab_link_show_external_link_icon: true
    visualized_auto_cluster: true
    numfig_secnum_depth: 2
    text_replacements:
      '# Admonitions': '# General blocks'
      '# Proofs': "# Theorems, Definitions and Examples"
      '# Custom components': "# Proofs and Solutions"
      '# Syntax Guide': "# Exercises"
      '# Sphinx extension: Grasple': "# Grasple exercises"
      '# Cartesian form of complex numbers': "# Complex numbers"
      '{numref}`Chapter %s <Chapter:Determinants>`': "{numref}`Section %s <Sec:DetGeometric>`"
      '# Determinants as areas or volumes': "# Determinants"
      'in {numref}`Subsection %s <Subsec:MatrixInv:DefInverse>` we saw': "in [Section 3.4 of our Linear Algebra book](https://interactivetextbooks.tudelft.nl/linear-algebra/Chapter3/MatrixInverse.html) we will see"
      'in {numref}`Section %s <Sec:DeterminantsViaCofactors>`': "in [Section 5.1 of our Linear Algebra book](https://interactivetextbooks.tudelft.nl/linear-algebra/Chapter5/DeterminantsViaCofactors.html)"
      '```{iframe} ../references.html': "```{iframe} ../../../../../references.html"
    mathjax3_config:
      loader:
        load: ['[tex]/cancel']
      tex:
        packages:
          '[+]': ['cancel']
        inlineMath: [ ['$','$'], ['\(','\)'] ]
        displayMath: [ ['$$','$$'], ['\[','\]'] ]
        macros:
          "Re": ["\\operatorname{Re}\\left(#1\\right)",1]
          "Im": ["\\operatorname{Im}\\left(#1\\right)",1]
          "vect": ["\\mathbf{#1}",1]
          "vec": ["\\mathbf{#1}",1]
          "nicefrac": ["\\frac{#1}{#2}", 2]
          "R": "\\mathbb{R}"
          "C": "\\mathbb{C}"
          "norm": ["\\left\\Vert #1 \\right\\Vert",1]
          "ip" : "\\cdot"
          "cp": ["\\times "]
          "erf": "\\operatorname{erf}"
    inverter_all: false
    html_js_files:
    - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js # Required for live code: https://teachbooks.io/manual/features/live_code.html
    thebe_config:
      use_thebe_lite: true                           # Required for live code: https://teachbooks.io/manual/features/live_code.html
      exclude_patterns: ["**/_*.yml", "**/*.md", "**/*.ipynb"] # Exclude files which should not be accessible for live code: https://teachbooks.io/manual/features/live_code.html
    html_theme_options:
      logo:
        text: Calculus
      repository_url: "https://github.com/TUDelft-PRIME-Books/Calculus"
      path_to_docs: "book"
      repository_branch: "published"
      use_edit_page_button: true
      use_repository_button: true
      use_issues_button : true
      launch_buttons:
        thebe: true                                  # Required for live code: https://teachbooks.io/manual/features/live_code.html
    html_show_copyright: false                       # As the copyright is included in the author field
    html_last_updated_fmt: ''              # Adds the date of the last update to the footer
  extra_extensions:                                  # Extra extensions to be used in the book
    - teachbooks_favourites
    - teachbooks_sphinx_grasple                      # Adds the Grasple exercises to your book 
    - sphinx_prime_applets                           # Adds the Prime applets to your book
    - sphinx_tudelft_theme                           # Adds the TU Delft theme to your book https://teachbooks.io/manual/external/Sphinx-TUDelft-theme/README.html
    - sphinx_indexed_definitions
    - sphinx_new_tab_link
    - sphinx_apa_references                     # For APA citations
    - sphinx_visualized
    - sphinx.ext.todo

bibtex_bibfiles: 
  - references.bib
